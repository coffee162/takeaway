    <style>
        :root {

            --muted: #777777;

            --border: #f0f0f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 60px;
            -webkit-tap-highlight-color: transparent;
        }

        /* Шапка */
        header {
            text-align: center;
            padding: 25px 20px 20px;
        }

        .main-logo {
            max-width: 120px;
            height: auto;
        }

        /* Навигация */
        .nav-container {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            padding: 12px 0;
        }

        .nav-scroll {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 0 20px;
            scrollbar-width: none;
        }
        .nav-scroll::-webkit-scrollbar { display: none; }

        .nav-link {
            text-decoration: none;
            color: var(--text);
            font-size: 13px;
            font-weight: 600;
            padding: 10px 18px;
            background: #f8f8f8;
            border-radius: 25px;
            white-space: nowrap;
            transition: 0.2s;
        }
        .nav-link.active { background: var(--text); color: #fff; }

        /* Контент */
        .container { max-width: 800px; margin: 0 auto; padding: 10px 20px; }

        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin: 45px 0 20px;
            padding-left: 10px;
            border-left: 4px solid var(--accent);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .card {
            background: #fff;
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .card:active { transform: scale(0.97); }

        .card-img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            background: #fdfdfd;
        }

        .card-info { padding: 12px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-name { font-weight: 600; font-size: 14px; line-height: 1.3; margin-bottom: 6px; color: #333; }
        .card-price { font-weight: 700; font-size: 16px; color: #000; }

        /* Модалка */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000; display: none; display: none;
            justify-content: center; align-items: center;
        }
        .modal-content {
            background: #fff; width: 100%; max-width: 380px;
            border-radius: 25px; overflow: hidden; position: relative; box-sizing: border-box;
            animation: slideUp 0.3s ease-out;
	    margin: 0;
 	    box-shadow: 0 20px 40px rgba(0,0,0,0.4)
	    animation: modalFadeUp 0.3s ease-out;
        }
        @keyframes modalFadeUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-close {
            position: absolute; top: 15px; right: 15px; z-index: 1001
            background: rgba(0,0,0,0.5); color: #fff; border: none;
            width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px;
        }
        .modal-body { padding: 20px; box-sizing: border-box; width: 100%; }
        .kbju-box {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 5px; margin-top: 15px; text-align: center;
            background: #fcfcfc; padding: 10px; border-radius: 20px;
            border: 1px solid var(--border);
	    box-sizing: border-box;
        }
        .kbju-item span { display: block; font-weight: 700; font-size: 14px; color: #000; }
        .kbju-label { font-size: 9px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
    </style>
</head>

                {name: "Какао с маршмеллоу", price: "290 ₽", img: "https://i.ibb.co/QvXQ5JyS/image.jpg", desc: "Уникальная рецептура от команды 1.62.", k: "377", b: "9,9", j: "18,2", u: "43,6"},

    ];

    const container = document.getElementById('menu-container');

    menuData.forEach(section => {
        const title = document.createElement('div');
        title.className = 'section-title';
        title.id = section.id;
        title.innerText = section.category;
        container.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'menu-grid';

        section.items.forEach(item => {
            grid.innerHTML += `
               <div class="card" onclick="openModal('${item.name}', '${item.price}', '${item.img}', '${item.k}', '${item.b}', '${item.j}', '${item.u}', '${item.desc || ''}')">
        <img src="${item.img}" class="card-img" alt="${item.name}">
        <div class="card-info">
            <div class="card-name">${item.name}</div>
            <div class="card-price">${item.price}</div>
        </div>
    </div>
            `;
        });
        container.appendChild(grid);
    });

    function openModal(name, price, img, k, b, j, u, d) {
    document.getElementById('m-name').innerText = name;
    document.getElementById('m-price').innerText = price;
    document.getElementById('m-img').src = img;
    document.getElementById('m-cal').innerText = k;
    document.getElementById('m-b').innerText = b;
    document.getElementById('m-j').innerText = j;
    document.getElementById('m-u').innerText = u;
    document.getElementById('m-desc').innerText = d;
    document.getElementById('modal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }

    // Скролл-активация категорий
    window.addEventListener('scroll', () => {
        let scrollPos = window.scrollY + 100;
        document.querySelectorAll('.section-title').forEach(section => {
            if (scrollPos >= section.offsetTop) {
                document.querySelectorAll('.nav-link').forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href').substring(1) === section.id) {
                        link.classList.add('active');
                    }
                });
            }
        });
    });
</script>
